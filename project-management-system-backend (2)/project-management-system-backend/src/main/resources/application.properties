# Server
server.port=8080

# MySQL DataSource
spring.datasource.url=jdbc:mysql://localhost:3306/pms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=your_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data.sql after JPA
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=pmsSecretKey2024SuperLongKeyForHMacSHA256SigningAlgorithm!@#
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:4200

# Logging
logging.level.com.pms=DEBUG
logging.level.org.springframework.security=DEBUG
