# Server
server.port=${PORT:8080}

# PostgreSQL DataSource
# - On Render, inject `DATABASE_URL` from the managed Postgres DB.
# - Spring expects JDBC URLs; Spring Boot 3 can consume `jdbc:postgresql://...`.
# - If your `DATABASE_URL` is `postgres://...`, prefer setting `JDBC_DATABASE_URL` to the JDBC form.
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/pms_db}}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize data.sql after JPA
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# JWT
jwt.secret=${JWT_SECRET:pmsSecretKey2024SuperLongKeyForHMacSHA256SigningAlgorithm!@#}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200,http://localhost:5173}

# Logging
logging.level.com.pms=DEBUG
logging.level.org.springframework.security=DEBUG
