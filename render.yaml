databases:
  - name: pms-postgres
    databaseName: pms
    user: pms

services:
  - type: web
    name: pms-backend
    runtime: java
    plan: free
    rootDir: "project-management-system-backend/project-management-system-backend"
    buildCommand: "chmod +x mvnw && ./mvnw -DskipTests package"
    startCommand: "java -jar target/project-management-system-backend-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pms-postgres
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://pms-frontend.onrender.com"
      - key: JWT_SECRET
        generateValue: true

  - type: staticSite
    name: pms-frontend
    rootDir: "project-management-system-frontend/project-management-system-frontend"
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://pms-backend.onrender.com/api"
